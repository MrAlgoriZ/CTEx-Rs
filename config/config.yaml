model:
  name: "RF"
  n_trees: 100
  max_depth: 5
  seed: 42
  train_test_split:
    train_ratio: 0.8

backend:
  listener: "0.0.0.0:3000"

data:
  success_threshold: 8.0
  accuracy_capacity: 192

prints:
  volatility: true
  cycle_start: false
  model_evualate: true
  price: false
  target: true
  prediction: true
  accuracy: true

token:
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT
  - DOGEUSDT
  - ADAUSDT
  - XRPUSDT
  - SOLUSDT

cycle_type: "training"
mode: "log"
