model:
  type: "RandomForest"
  params:
    kind: "RandomForest"
    n_trees: 50
    max_depth: 5
    min_samples_leaf: 8
    min_samples_split: 2
    m: 3

  train_test_split:
    train_ratio: 0.8
  metric: "ALL"
  seed: 42

backend:
  enabled: false
  listener: "0.0.0.0:3000"
  admin_password: "123"

servers:
  - "127.0.0.1:3737"

behaviour:
  success_threshold: 0.3
  accuracy_capacity: 192
  predictions_capacity: 96

prints:
  model:
    skipped_values: false
    metrics: false
  cycle:
    volatility: true
    cycle_start: true
    price: false
    target: true
    prediction: true
    accuracy: true
  manager:
    manager_init: true
    additional_manager_prints: true

symbols:
  - SOLUSDT

runtime:
  type: "backtest"
  with_training: true
  with_saves: false
  cycle_type: "sandbox"

main_exchange: "binance"

timeframes:
  main: "15m"
  background: "1m"
mode: "print"
