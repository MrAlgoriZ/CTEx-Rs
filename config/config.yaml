model:
  name: "RF"
  n_trees: 100
  max_depth: 5
  seed: 42
  train_test_split:
    train_ratio: 0.8
  metric: "MAE"

backend:
  enabled: false
  listener: "0.0.0.0:3000"
  admin_password: "123"

servers:
  - "127.0.0.1:3737"

behaviour:
  success_threshold:
    minimum: 0.2
    default: 1.0
    maximum: 1.7
    ratio: 1.25
  risk_threshold:
    minimum: 0.5
    default: 1.0
    maximum: 3.0
  trading_mode_value:
    minimum: -1.0
    default: 0.0
    maximum: 1.0
  accuracy_capacity: 192
  feedback_engine_capacity: 5

prints:
  model:
    evualate: false
    metrics: false
  cycle:
    volatility: true
    cycle_start: true
    price: false
    target: true
    prediction: true
    accuracy: true
  manager:
    manager_init: true
    additional_manager_prints: true

token:
  - TRXUSDT

runtime:
  type: "backtest"
  with_training: true
  cycle_type: "training"

main_exchange: "binance"
main_timeframe: "15m"
mode: "print"
